<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uber Local - Pasajero</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://maps.googleapis.com/maps/api/js?key=TU_CLAVE_GOOGLE_MAPS_AQUI&libraries=geometry"></script>
</head>
<body>
  <div class="header">
    <div class="logo">Uber Local</div>
    <div>Pasajero</div>
  </div>

  <div class="card">
    <h2>¿A dónde vamos?</h2>
    <input type="text" id="origen" class="input" placeholder="Origen (usa ubicación actual)" readonly>
    <input type="text" id="destino" class="input" placeholder="¿Dónde quieres ir?">
    <button onclick="solicitarViaje()" class="btn btn-primary">Pedir Ride</button>
  </div>

  <div id="map" style="height: 400px; margin: 15px; border-radius: 16px;"></div>

  <div id="viajeActivo" class="card" style="display:none;">
    <h3>Viaje en curso</h3>
    <div id="estadoViaje" class="status">Buscando conductor...</div>
    <button onclick="cancelarViaje()" class="btn btn-secondary">Cancelar</button>
  </div>

  <script src="js/config.js"></script>
  <script src="js/map.js"></script>
  <script src="js/pasajero.js"></script>
</body>
</html>
